<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A04_Job Application Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        *{
            font-family: 'Geist', sans-serif;
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <header>
        <h1 class="text-3xl font-bold text-[#002C5C] mb-8">Job Application Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-gray-500 font-medium mb-1">Total</p>
                <h2 id="total-count" class="text-4xl font-bold text-[#002C5C]">8</h2>
            </div>

            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-gray-500 font-medium mb-1">Interview</p>
                <h2 id="interview-count" class="text-4xl font-bold text-[#00C07F]">0</h2>
            </div>

            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-gray-500 font-medium mb-1">Rejected</p>
                <h2 id="rejected-count" class="text-4xl font-bold text-[#FF4D4D]">0</h2>
            </div>
        </div>

        <hr class="text-gray-300 mb-10">
    </header>

    <script src="./script.js"></script>
</body>
</html>
